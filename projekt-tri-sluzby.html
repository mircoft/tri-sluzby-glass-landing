<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra Cool 3 Stlpce</title>
  <meta name="description" content="Cista stranka s tromi klikatelnymi sklenenymi banermi a efektami.">
  <style>
    :root {
      --text: #ecf2ff;
      --glass: rgba(255, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.3);
      --shadow: rgba(0, 0, 0, 0.4);
      --blur: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, #6b2cff 0%, transparent 45%),
        radial-gradient(circle at 85% 18%, #00bfff 0%, transparent 40%),
        radial-gradient(circle at 52% 85%, #ff2f8f 0%, transparent 38%),
        linear-gradient(135deg, #080a1d 0%, #141938 100%);
      animation: bgShift 12s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% { filter: hue-rotate(0deg) saturate(100%); }
      100% { filter: hue-rotate(18deg) saturate(125%); }
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 3px 3px;
      mix-blend-mode: soft-light;
      opacity: 0.3;
    }

    .wrap {
      min-height: 100vh;
      width: min(1320px, 94%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
    }

    .lang-switch {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      z-index: 20;
    }

    .lang-btn {
      border: 1px solid rgba(255, 255, 255, 0.45);
      background: rgba(20, 24, 55, 0.45);
      color: var(--text);
      border-radius: 999px;
      padding: 0.5rem 0.8rem;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .lang-btn:hover,
    .lang-btn.active {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.75);
    }

    .col {
      flex: 1;
      min-height: 78vh;
      position: relative;
      border-radius: 28px;
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      box-shadow: 0 25px 50px -20px var(--shadow);
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: flex-end;
      padding: 2rem;
      transition: transform 0.45s ease, box-shadow 0.45s ease, border-color 0.45s ease;
      isolation: isolate;
    }

    .col::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(140deg, rgba(255,255,255,0.35), rgba(255,255,255,0), rgba(255,255,255,0.25));
      opacity: 0.55;
      z-index: -1;
      transition: opacity 0.45s ease;
    }

    .col::after {
      content: "";
      position: absolute;
      width: 180%;
      height: 180%;
      top: -70%;
      left: -40%;
      background: conic-gradient(from 180deg, transparent 0deg, rgba(255,255,255,0.24) 120deg, transparent 220deg);
      transform: rotate(0deg);
      transition: transform 0.9s ease;
      z-index: -1;
    }

    .col:hover,
    .col:focus-visible {
      transform: translateY(-14px) scale(1.02);
      box-shadow: 0 35px 70px -24px rgba(0, 0, 0, 0.75);
      border-color: rgba(255, 255, 255, 0.65);
      outline: none;
    }

    .col:hover::before,
    .col:focus-visible::before {
      opacity: 0.9;
    }

    .col:hover::after,
    .col:focus-visible::after {
      transform: rotate(28deg);
    }

    .label {
      display: inline-block;
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: rgba(8, 8, 20, 0.25);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.95rem;
    }

    h2 {
      font-size: clamp(1.6rem, 2.1vw, 2.4rem);
      line-height: 1.15;
      text-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
      margin-bottom: 0.45rem;
    }

    p {
      font-size: 0.95rem;
      opacity: 0.88;
      max-width: 26ch;
    }

    .one { background: linear-gradient(160deg, rgba(96, 36, 255, 0.38), rgba(15, 20, 55, 0.2)); }
    .two { background: linear-gradient(160deg, rgba(16, 170, 255, 0.36), rgba(10, 30, 45, 0.2)); }
    .three { background: linear-gradient(160deg, rgba(255, 50, 150, 0.3), rgba(30, 15, 38, 0.2)); }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .wrap {
        min-height: auto;
        flex-direction: column;
        padding: 1rem 0.85rem 2rem;
      }

      .col {
        width: 100%;
        min-height: 30vh;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="lang-switch">
    <button class="lang-btn active" type="button" data-lang="sk">SK</button>
    <button class="lang-btn" type="button" data-lang="de">DE</button>
  </div>

  <main class="wrap">
    <a class="col one" href="#">
      <div>
        <span class="label" data-i18n="label1">Sektor 01</span>
        <h2 data-i18n="title1">Svadobne fotenie</h2>
        <p data-i18n="text1">Klikni a prejdi do sekcie s portfoliom.</p>
      </div>
    </a>

    <a class="col two" href="#">
      <div>
        <span class="label" data-i18n="label2">Sektor 02</span>
        <h2 data-i18n="title2">E-shopy na mieru</h2>
        <p data-i18n="text2">Klikni a prejdi do sekcie web developmentu.</p>
      </div>
    </a>

    <a class="col three" href="#">
      <div>
        <span class="label" data-i18n="label3">Sektor 03</span>
        <h2 data-i18n="title3">Automatizacia</h2>
        <p data-i18n="text3">Klikni a prejdi do sekcie realizacii projektov.</p>
      </div>
    </a>
  </main>
  <script>
    const dictionary = {
      sk: {
        label1: "Sektor 01",
        title1: "Svadobne fotenie",
        text1: "Klikni a prejdi do sekcie s portfoliom.",
        label2: "Sektor 02",
        title2: "E-shopy na mieru",
        text2: "Klikni a prejdi do sekcie web developmentu.",
        label3: "Sektor 03",
        title3: "Automatizacia",
        text3: "Klikni a prejdi do sekcie realizacii projektov."
      },
      de: {
        label1: "Bereich 01",
        title1: "Hochzeitsfotografie",
        text1: "Klicke und gehe zur Portfolio-Sektion.",
        label2: "Bereich 02",
        title2: "Massgeschneiderte Shops",
        text2: "Klicke und gehe zur Web-Development-Sektion.",
        label3: "Bereich 03",
        title3: "Automatisierung",
        text3: "Klicke und gehe zur Projekt-Sektion."
      }
    };

    const buttons = document.querySelectorAll(".lang-btn");
    const targets = document.querySelectorAll("[data-i18n]");

    function setLanguage(lang) {
      const pack = dictionary[lang];
      if (!pack) return;

      document.documentElement.lang = lang;
      targets.forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (pack[key]) el.textContent = pack[key];
      });

      buttons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
    }

    buttons.forEach((btn) => {
      btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
    });
  </script>
</body>
</html>
