<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — thedesigns.org</title>
  <meta name="description" content="Stránka sa nenašla.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#050b18">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#050b18;
      --text:#ecf4ff;
      --muted:rgba(236,244,255,.72);
      --hair:rgba(255,255,255,.12);
      --accent:#55a7ff;
      --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      min-height:100vh;
      font-family:Inter,ui-sans-serif,system-ui,sans-serif;
      color:var(--text);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:32px 20px;
      text-align:center;
      background:
        radial-gradient(circle at 15% 12%,rgba(85,167,255,.22),transparent 42%),
        radial-gradient(circle at 80% 18%,rgba(140,90,255,.18),transparent 44%),
        linear-gradient(180deg,var(--bg) 0%,#0a1730 100%);
    }
    .code{
      font-family:var(--mono);
      font-size:clamp(4rem,14vw,7rem);
      font-weight:900;
      letter-spacing:-0.04em;
      line-height:1;
      background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      margin-bottom:12px;
    }
    h1{
      font-size:clamp(1.15rem,3vw,1.45rem);
      font-weight:700;
      max-width:36ch;
      margin-bottom:8px;
    }
    .sub{
      color:var(--muted);
      font-size:.98rem;
      max-width:42ch;
      line-height:1.55;
      margin-bottom:28px;
    }
    .lang-row{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
    .lang-row button{
      border:1px solid var(--hair);
      border-radius:10px;
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:8px 12px;
      font-size:.72rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-family:var(--mono);
      cursor:pointer;
    }
    .lang-row button.on{border-color:rgba(85,167,255,.55);background:rgba(85,167,255,.12)}
    .links{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      max-width:520px;
    }
    .links a{
      border:1px solid var(--hair);
      border-radius:14px;
      padding:12px 16px;
      text-decoration:none;
      color:var(--text);
      font-weight:700;
      font-size:.9rem;
      background:rgba(255,255,255,.03);
      transition:.16s ease;
    }
    .links a:hover{border-color:rgba(85,167,255,.5);transform:translateY(-2px)}
    .home{margin-top:28px}
    .home a{
      font-family:var(--mono);
      font-size:.78rem;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:var(--accent);
      text-decoration:none;
      font-weight:800;
    }
    .home a:hover{text-decoration:underline}
    a:focus-visible,button:focus-visible{
      outline:2px solid rgba(85,167,255,.8);
      outline-offset:3px;
    }
  </style>
</head>
<body>
  <div class="code" aria-hidden="true">404</div>
  <h1 data-i18n="h1">Táto stránka neexistuje.</h1>
  <p class="sub" data-i18n="sub">Adresa môže byť zastaralá alebo ste sa pomýlili v URL. Vyberte jednu z častí webu nižšie.</p>
  <div class="lang-row" aria-label="Jazyk">
    <button type="button" class="on" data-lang="sk">SK</button>
    <button type="button" data-lang="de">DE</button>
  </div>
  <nav class="links" aria-label="Navigácia">
    <a href="/" data-i18n="nav0">Úvod</a>
    <a href="/foto/" data-i18n="nav1">Design Studio / Foto</a>
    <a href="/weby/" data-i18n="nav2">Weby &amp; e-shopy</a>
    <a href="/elektro/" data-i18n="nav3">Automatizácia</a>
  </nav>
  <p class="home"><a href="/" data-i18n="back">← Späť na úvod</a></p>
  <script>
    const T = {
      sk: {
        h1: "Táto stránka neexistuje.",
        sub: "Adresa môže byť zastaralá alebo ste sa pomýlili v URL. Vyberte jednu z častí webu nižšie.",
        nav0: "Úvod",
        nav1: "Design Studio / Foto",
        nav2: "Weby & e-shopy",
        nav3: "Automatizácia",
        back: "← Späť na úvod"
      },
      de: {
        h1: "Diese Seite existiert nicht.",
        sub: "Die Adresse ist veraltet oder die URL war falsch. Wählen Sie unten einen Bereich.",
        nav0: "Start",
        nav1: "Design Studio / Foto",
        nav2: "Websites & Shops",
        nav3: "Automatisierung",
        back: "← Zurück zur Startseite"
      }
    };
    const els = document.querySelectorAll("[data-i18n]");
    const btns = document.querySelectorAll(".lang-row button");
    function setL(lang) {
      const p = T[lang];
      if (!p) return;
      document.documentElement.lang = lang;
      els.forEach(function (el) {
        var k = el.getAttribute("data-i18n");
        if (p[k]) el.textContent = p[k];
      });
      btns.forEach(function (b) { b.classList.toggle("on", b.dataset.lang === lang); });
    }
    btns.forEach(function (b) {
      b.addEventListener("click", function () { setL(b.dataset.lang); });
    });
  </script>
</body>
</html>
