<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tri stlpce - thedesigns.org</title>
  <meta name="description" content="Tri projekty pod jednou doménou: svadobné fotenie, weby/e-shopy na mieru a automatizácia/elektro.">
  <style>
    :root {
      --text: #ecf2ff;
      --glass: rgba(255, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.3);
      --shadow: rgba(0, 0, 0, 0.4);
      --blur: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;
      background:
        radial-gradient(circle at 10% 10%, rgba(255,255,255,0.06), transparent 42%),
        radial-gradient(circle at 80% 20%, rgba(54,246,255,0.05), transparent 46%),
        linear-gradient(180deg, #05060a 0%, #0c1020 55%, #05060a 100%);
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 3px 3px;
      mix-blend-mode: soft-light;
      opacity: 0.18;
    }

    .wrap {
      min-height: 100vh;
      width: min(1320px, 94%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
    }

    .lang-switch {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      z-index: 20;
    }

    .lang-btn {
      border: 1px solid rgba(255, 255, 255, 0.45);
      background: rgba(20, 24, 55, 0.45);
      color: var(--text);
      border-radius: 999px;
      padding: 0.5rem 0.8rem;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .lang-btn:hover,
    .lang-btn.active {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.75);
    }

    .col {
      flex: 1;
      min-height: 78vh;
      position: relative;
      border-radius: 28px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 18px 40px -22px var(--shadow);
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: flex-end;
      padding: 2rem;
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
      isolation: isolate;
    }

    .col::before {
      content: "";
      position: absolute;
      inset: -1px;
      background: linear-gradient(140deg, rgba(255,255,255,0.22), rgba(255,255,255,0), rgba(255,255,255,0.18));
      opacity: 0.75;
      z-index: -1;
      transition: opacity 0.45s ease;
    }

    .col:hover,
    .col:focus-visible {
      transform: translateY(-14px) scale(1.02);
      box-shadow: 0 35px 70px -24px rgba(0, 0, 0, 0.75);
      border-color: rgba(255, 255, 255, 0.65);
      outline: none;
    }

    .col:hover::before,
    .col:focus-visible::before { opacity: 0.9; }

    .label {
      display: inline-block;
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: rgba(8, 8, 20, 0.25);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.95rem;
    }

    h2 {
      font-size: clamp(1.6rem, 2.1vw, 2.4rem);
      line-height: 1.15;
      text-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
      margin-bottom: 0.45rem;
    }

    p {
      font-size: 0.95rem;
      opacity: 0.88;
      max-width: 26ch;
    }

    .one { background: linear-gradient(160deg, rgba(96, 36, 255, 0.38), rgba(15, 20, 55, 0.2)); }
    .two { background: linear-gradient(160deg, rgba(16, 170, 255, 0.36), rgba(10, 30, 45, 0.2)); }
    .three { background: linear-gradient(160deg, rgba(255, 50, 150, 0.3), rgba(30, 15, 38, 0.2)); }

    footer {
      position: fixed;
      left: 1rem;
      bottom: 1rem;
      opacity: 0.75;
      font-size: 0.82rem;
      z-index: 5;
      user-select: none;
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .wrap { min-height: auto; flex-direction: column; padding: 1rem 0.85rem 2rem; }
      .col { width: 100%; min-height: 30vh; }
      footer { position: static; margin: 1rem; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="lang-switch">
    <button class="lang-btn active" type="button" data-lang="sk">SK</button>
    <button class="lang-btn" type="button" data-lang="de">DE</button>
  </div>

  <main class="wrap">
    <a class="col one" href="./foto/" aria-label="Svadobné fotenie">
      <div>
        <span class="label" data-i18n="label1">Sektor 01</span>
        <h2 data-i18n="title1">Svadobné fotenie</h2>
        <p data-i18n="text1">Klikni a prejdite na svadobné fotenie.</p>
      </div>
    </a>

    <a class="col two" href="./weby/" aria-label="Weby a e-shopy na mieru">
      <div>
        <span class="label" data-i18n="label2">Sektor 02</span>
        <h2 data-i18n="title2">Weby & e-shopy</h2>
        <p data-i18n="text2">Klikni a prejdite na výrobu e-shopov.</p>
      </div>
    </a>

    <a class="col three" href="./elektro/" aria-label="Automatizácia a elektro projekty">
      <div>
        <span class="label" data-i18n="label3">Sektor 03</span>
        <h2 data-i18n="title3">Automatizácia & elektro</h2>
        <p data-i18n="text3">Klikni a prejdite na elektro portfólio.</p>
      </div>
    </a>
  </main>

  <footer>
    <span>thedesigns.org</span>
  </footer>

  <script>
    const dictionary = {
      sk: {
        label1: "Sektor 01",
        title1: "Svadobné fotenie",
        text1: "Klikni a prejdite na svadobné fotenie.",
        label2: "Sektor 02",
        title2: "Weby & e-shopy",
        text2: "Klikni a prejdite na výrobu e-shopov.",
        label3: "Sektor 03",
        title3: "Automatizácia & elektro",
        text3: "Klikni a prejdite na elektro portfólio."
      },
      de: {
        label1: "Bereich 01",
        title1: "Hochzeitsfotografie",
        text1: "Klicke und gehe zu Hochzeitsfotografie.",
        label2: "Bereich 02",
        title2: "Webseiten & Shops",
        text2: "Klicke und gehe zu Webshop-Entwicklung.",
        label3: "Bereich 03",
        title3: "Automatisierung & Elektro",
        text3: "Klicke und gehe zu Elektro-Projekten."
      }
    };

    const buttons = document.querySelectorAll(".lang-btn");
    const targets = document.querySelectorAll("[data-i18n]");

    function setLanguage(lang) {
      const pack = dictionary[lang];
      if (!pack) return;

      document.documentElement.lang = lang;
      targets.forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (pack[key]) el.textContent = pack[key];
      });

      buttons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
    }

    buttons.forEach((btn) => {
      btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
    });
  </script>
</body>
</html>
